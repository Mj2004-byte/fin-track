<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FinTrack — by Manish</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ─── reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }

/* ─── theme tokens ─── */
:root {
  --ff: 'DM Sans', sans-serif;
  --fm: 'DM Mono', monospace;
  --fd: 'Syne', sans-serif;
  --ease: 0.18s ease;

  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --border:    #e4e2dc;
  --border2:   #ccc9c0;
  --text:      #1a1916;
  --text2:     #6b6860;
  --text3:     #a8a49c;
  --accent:    #2563eb;
  --accent-bg: #eff4ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --amber:     #d97706;
  --amber-bg:  #fffbeb;
  --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --ai-accent: #0891b2;
  --ai-bg:     #ecfeff;
  --ai-border: #a5f3fc;
  --upi:       #7c3aed;
  --upi-bg:    #f5f3ff;
  --upi-border:#c4b5fd;
}

[data-theme="dark"] {
  --bg:        #111110;
  --surface:   #1c1b19;
  --border:    #2e2d2a;
  --border2:   #3d3c38;
  --text:      #e8e6e0;
  --text2:     #8a8780;
  --text3:     #504e48;
  --accent:    #3b82f6;
  --accent-bg: #1e2d4a;
  --green:     #22c55e;
  --green-bg:  #0f2a1a;
  --red:       #f87171;
  --red-bg:    #2a1212;
  --amber:     #fbbf24;
  --amber-bg:  #2a1f08;
  --shadow:    0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --ai-accent: #22d3ee;
  --ai-bg:     #0a2a30;
  --ai-border: #164e63;
  --upi:       #a78bfa;
  --upi-bg:    #1a1030;
  --upi-border:#4c1d95;
}

/* ─── SPLASH ─── */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #0f0e0c;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#splash.hide { opacity: 0; pointer-events: none; transform: scale(1.04); }

.splash-logo-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  animation: splashIn 0.7s cubic-bezier(.16,1,.3,1) both;
}
@keyframes splashIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.splash-icon {
  width: 88px; height: 88px;
  border-radius: 22px;
  background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 40%, #0891b2 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 60px rgba(8,145,178,0.35), 0 8px 24px rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
  animation: splashPulse 2s ease-in-out infinite;
}
@keyframes splashPulse {
  0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 60px rgba(8,145,178,0.35), 0 8px 24px rgba(0,0,0,0.4); }
  50%       { box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 24px 70px rgba(8,145,178,0.5), 0 8px 24px rgba(0,0,0,0.4); }
}
.splash-icon::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  border-radius: inherit;
}
.splash-icon svg { position: relative; z-index: 1; }

.splash-wordmark {
  font-family: var(--fd);
  font-size: 34px; font-weight: 700;
  color: #f0ede8;
  letter-spacing: -0.5px;
}
.splash-wordmark em { font-style: normal; color: #38bdf8; }

.splash-tagline {
  font-family: var(--fm);
  font-size: 12px;
  color: #504e48;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
  animation: splashIn 0.7s 0.2s cubic-bezier(.16,1,.3,1) both;
}

.splash-by {
  font-family: var(--fm);
  font-size: 11px;
  color: #3d3c38;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 40px;
  animation: splashIn 0.7s 0.35s cubic-bezier(.16,1,.3,1) both;
}
.splash-by span { color: #0891b2; }

.splash-bar-wrap {
  width: 160px; height: 2px;
  background: #2e2d2a;
  border-radius: 2px;
  margin-top: 32px;
  overflow: hidden;
  animation: splashIn 0.5s 0.5s both;
}
.splash-bar {
  height: 100%;
  background: linear-gradient(90deg, #1d4ed8, #0891b2);
  border-radius: 2px;
  animation: splashLoad 2.6s cubic-bezier(.4,0,.2,1) 0.3s both;
}
@keyframes splashLoad {
  from { width: 0; }
  to   { width: 100%; }
}

/* ─── base ─── */
body {
  font-family: var(--ff);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background var(--ease), color var(--ease);
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* ─── layout ─── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ─── sidebar ─── */
.sidebar {
  width: 224px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto;
  transition: transform var(--ease); z-index: 50;
}
.sidebar-top {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, #1e3a8a, #0891b2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(8,145,178,0.3);
}
.wordmark { font-family: var(--fd); font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
.wordmark em { font-style: normal; color: var(--accent); }

.sidebar-nav { padding: 12px 8px; flex: 1; }
.nav-section { font-family: var(--fm); font-size: 9.5px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); padding: 8px 10px 4px; }

.nav-link {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 7px;
  cursor: pointer; font-size: 13.5px; font-weight: 500;
  color: var(--text2);
  transition: background var(--ease), color var(--ease);
  margin-bottom: 1px; user-select: none;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-link:hover { background: var(--bg); color: var(--text); }
.nav-link.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
.nav-link.active-upi { background: var(--upi-bg); color: var(--upi); font-weight: 600; }
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-pill {
  margin-left: auto; font-family: var(--fm); font-size: 10px;
  background: var(--border); color: var(--text3); padding: 1px 6px; border-radius: 10px;
}
.nav-pill-new { background: var(--upi-bg); color: var(--upi); border: 1px solid var(--upi-border); }

.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
.role-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 7px; background: var(--bg); margin-bottom: 8px;
}
.role-label { font-size: 12px; color: var(--text2); }
.role-value { font-family: var(--fm); font-size: 11px; font-weight: 500; color: var(--green); }

/* ─── main ─── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ─── topbar ─── */
.topbar {
  height: 52px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px; flex-shrink: 0;
}
.topbar-title { font-family: var(--fd); font-size: 14px; font-weight: 600; color: var(--text); }
.topbar-sep { color: var(--border2); font-size: 16px; }
.topbar-sub { font-size: 13px; color: var(--text2); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.search-wrap {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 11px;
  transition: border-color var(--ease);
}
.search-wrap:focus-within { border-color: var(--accent); }
.search-wrap input { background: none; border: none; outline: none; font-family: var(--ff); font-size: 13px; color: var(--text); width: 160px; }
.search-wrap input::placeholder { color: var(--text3); }

.theme-btn {
  width: 32px; height: 32px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all var(--ease); flex-shrink: 0;
}
.theme-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }
.hamburger { display: none; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 2px; }

/* ─── page ─── */
.page { flex: 1; overflow-y: auto; padding: 24px; }
.page-head { margin-bottom: 22px; }
.page-head h1 { font-family: var(--fd); font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.page-head p { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* ─── buttons ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  padding: 7px 13px; border-radius: 7px; font-family: var(--ff);
  font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent;
  transition: all var(--ease); white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.1); }
.btn-upi { background: var(--upi); color: #fff; border-color: var(--upi); }
.btn-upi:hover { filter: brightness(1.1); }
.btn-outline { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-outline:hover { border-color: var(--border2); background: var(--bg); }
.btn-ghost { background: none; color: var(--text2); border-color: transparent; }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: transparent; }
.btn-danger:hover { border-color: var(--red); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ─── cards ─── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; box-shadow: var(--shadow); }
.card-label { font-family: var(--fm); font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

/* ─── stats ─── */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; box-shadow: var(--shadow); }
.stat-card-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.stat-card-value { font-family: var(--fm); font-size: 20px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 4px; }
.stat-card-sub { font-size: 11.5px; color: var(--text3); }
.val-green { color: var(--green); }
.val-red { color: var(--red); }
.val-amber { color: var(--amber); }
.val-blue { color: var(--accent); }

/* ─── charts ─── */
.charts-row { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; margin-bottom: 18px; }
.chart-box { height: 200px; position: relative; }

/* ─── table ─── */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; }
.table-toolbar { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.table-toolbar-right { margin-left: auto; display: flex; gap: 7px; flex-wrap: wrap; }
table { width: 100%; border-collapse: collapse; }
thead th { font-family: var(--fm); font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text3); font-weight: 500; padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { color: var(--text2); }
tbody tr { border-bottom: 1px solid var(--border); transition: background var(--ease); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
td { padding: 11px 16px; vertical-align: middle; }
td.mono { font-family: var(--fm); font-size: 12px; color: var(--text2); }
.amount-pos { font-family: var(--fm); font-size: 13px; font-weight: 500; color: var(--green); }
.amount-neg { font-family: var(--fm); font-size: 13px; font-weight: 500; color: var(--red); }
.cat-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 5px; font-size: 11.5px; font-weight: 500; }
.type-badge { display: inline-block; font-family: var(--fm); font-size: 10px; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.3px; }
.type-income { background: var(--green-bg); color: var(--green); }
.type-expense { background: var(--red-bg); color: var(--red); }
.type-upi { background: var(--upi-bg); color: var(--upi); }
.action-row { display: flex; gap: 4px; }

/* ─── filters ─── */
.select-field, .date-field { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--ff); font-size: 13px; border-radius: 7px; padding: 6px 10px; outline: none; transition: border-color var(--ease); cursor: pointer; }
.select-field:focus, .date-field:focus { border-color: var(--accent); }
.select-field option { background: var(--surface); }

/* ─── modal ─── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .14s ease; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { opacity: 0; transform: translateY(14px) } to { opacity: 1; transform: translateY(0) } }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 440px; box-shadow: var(--shadow-md); animation: slideUp .2s ease; }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-family: var(--fd); font-size: 16px; font-weight: 600; }
.modal-x { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 0 4px; }
.modal-x:hover { color: var(--text); }

.field-group { margin-bottom: 14px; }
.field-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--ff); font-size: 13.5px; padding: 8px 11px; outline: none; transition: border-color var(--ease); }
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text3); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-err { font-size: 11px; color: var(--red); margin-top: 3px; }
.modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

/* ─── info banner ─── */
.info-banner { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--accent-bg); border: 1px solid var(--accent); border-radius: 8px; font-size: 13px; color: var(--accent); margin-bottom: 16px; }

/* ─── empty ─── */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty p { font-family: var(--fm); font-size: 13px; }

/* ─── insights ─── */
.insights-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 18px; }
.health-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 16px; margin-top: 14px; }
.health-name { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.health-val { font-family: var(--fm); font-size: 20px; font-weight: 500; margin-bottom: 6px; }
.prog-bar { height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }
.health-status { font-size: 11.5px; margin-top: 4px; }
.cat-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.cat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
.cat-name { color: var(--text2); display: flex; align-items: center; gap: 6px; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-amt { font-family: var(--fm); font-size: 12px; }
.cat-bar { height: 3px; background: var(--border); border-radius: 10px; overflow: hidden; }
.cat-fill { height: 100%; border-radius: 10px; transition: width 0.7s ease; }

/* ─── monthly ─── */
.month-list { display: flex; flex-direction: column; gap: 13px; margin-top: 10px; }
.month-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
.month-name { font-family: var(--fm); font-size: 11px; color: var(--text3); }
.month-nums { display: flex; gap: 10px; }
.month-nums span { font-family: var(--fm); font-size: 11px; }

/* ─── UPI PAGE ─── */
.upi-hero {
  background: linear-gradient(135deg, var(--upi-bg) 0%, var(--surface) 100%);
  border: 1px solid var(--upi-border);
  border-radius: 14px;
  padding: 32px;
  display: flex; align-items: center; gap: 28px;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.upi-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
}
.upi-icon-big {
  width: 72px; height: 72px; flex-shrink: 0;
  border-radius: 18px;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  box-shadow: 0 4px 20px rgba(124,58,237,0.35);
}
.upi-hero-text h2 { font-family: var(--fd); font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.upi-hero-text p { font-size: 13.5px; color: var(--text2); line-height: 1.6; max-width: 420px; }

.upi-steps-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 20px; }
.upi-step { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.step-num { width: 28px; height: 28px; border-radius: 8px; background: var(--upi-bg); color: var(--upi); border: 1px solid var(--upi-border); display: flex; align-items: center; justify-content: center; font-family: var(--fm); font-size: 12px; font-weight: 500; margin-bottom: 12px; }
.upi-step h4 { font-size: 13.5px; font-weight: 600; margin-bottom: 5px; }
.upi-step p { font-size: 12.5px; color: var(--text2); line-height: 1.55; }

.phone-input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.phone-input-card h3 { font-family: var(--fd); font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.phone-input-card .sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

.phone-row { display: flex; gap: 10px; align-items: flex-end; }
.phone-prefix { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; font-family: var(--fm); font-size: 14px; color: var(--text2); flex-shrink: 0; }

/* ────────── state ────────── */
const load = () => {
  try { const s=localStorage.getItem('ft_v4'); if(s) return JSON.parse(s); } catch{}
  return { txns: TXNS, role:'admin', dark: false, upiConnected: false, upiPhone: '' };
};
const reducer = (s,a) => {
  switch(a.type){
    case 'ADD': return {...s,txns:[a.tx,...s.txns]};
    case 'UPD': return {...s,txns:s.txns.map(t=>t.id===a.tx.id?a.tx:t)};
    case 'DEL': return {...s,txns:s.txns.filter(t=>t.id!==a.id)};
    case 'ROLE': return {...s,role:a.role};
    case 'DARK': return {...s,dark:a.dark};
    case 'UPI_CONNECT': return {...s,upiConnected:true,upiPhone:a.phone};
    case 'UPI_DISCONNECT': return {...s,upiConnected:false,upiPhone:''};
    default: return s;
  }
};

const Ctx = createContext(null);
const useS = ()=>useContext(Ctx);

function Provider({children}){
  const [s,d]=useReducer(reducer,null,load);
  useEffect(()=>{ try{localStorage.setItem('ft_v4',JSON.stringify(s))}catch{} },[s]);
  useEffect(()=>{ document.documentElement.setAttribute('data-theme', s.dark?'dark':'light'); },[s.dark]);
  return <Ctx.Provider value={{s,d}}>{children}</Ctx.Provider>;
}

/* ────────── computed ────────── */
function stats(txns){
  const inc = txns.filter(t=>t.amount>0).reduce((a,t)=>a+t.amount,0);
  const exp = txns.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0);
  const bal = inc - exp;
  const sav = inc>0?((inc-exp)/inc*100):0;
  const byCat = {};
  CATS.forEach(c=>{byCat[c.id]=0;});
  txns.filter(t=>t.amount<0).forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+Math.abs(t.amount);});
  return {inc,exp,bal,sav,byCat};
}

function TxModal({tx,onClose}){

    const e={};

    if(!f.date) e.date='Required';

const CHIPS=['Where am I wasting money?','How to save more?','Monthly summary','Am I on track?','Best investment tip'];

function buildCtx(txns){
  const {inc,exp,bal,sav,byCat}=stats(txns);
  const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${catOf(k).name}: ${fmtMoney(v)}`).join(', ');
  const byM={};
  txns.forEach(t=>{
    const k=t.date.slice(0,7);
    if(!byM[k]) byM[k]={i:0,e:0};
    t.amount>0?byM[k].i+=t.amount:byM[k].e+=Math.abs(t.amount);
  });
  const mSummary=Object.entries(byM).sort((a,b)=>a[0]>b[0]?1:-1).slice(-3)
    .map(([m,d])=>`${m}: in ${fmtMoney(d.i)}, out ${fmtMoney(d.e)}`).join(' | ');
  return `User finance data (Indian rupees):
Total income: ${fmtMoney(inc)} | Expenses: ${fmtMoney(exp)} | Balance: ${fmtMoney(bal)} | Savings rate: ${sav.toFixed(1)}%
Top spend categories: ${top}
Monthly: ${mSummary}
Rent/Bills: ${fmtMoney(byCat.rent)} | Food: ${fmtMoney(byCat.food)} | Shopping: ${fmtMoney(byCat.shopping)} | Transport: ${fmtMoney(byCat.transport)} | Investments: ${fmtMoney(byCat.invest)}`;
}

function AIPanel({txns}){
  const {s}=useS();

  }]);

  const [busy,setBusy]=useState(false);
  const [mic,setMic]=useState(false);
  const listRef=useRef(null);
  const recog=useRef(null);
  const synth=useRef(window.speechSynthesis);
  const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  useEffect(()=>{ if(listRef.current) listRef.current.scrollTop=listRef.current.scrollHeight; },[msgs,busy]);

  const send=async(text)=>{
    if(!text.trim()||busy) return;
    setMsgs(m=>[...m,{id:Date.now(),role:'user',text:text.trim(),t:now()}]);
    setInp(''); setBusy(true);
    const sys=`You are Finny, a warm, witty personal finance advisor who speaks like a knowledgeable friend. Keep replies short (2-4 sentences). Use real numbers from the data. Be specific, practical, and encouraging. Use Indian financial context (SIP, UPI, mutual funds, etc). No formal language. Add a relevant emoji sometimes.

${buildCtx(txns)}`;

        body:JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1000,
          system:sys,
          messages:[
            ...msgs.slice(1).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text})),
            {role:'user',content:text.trim()}
          ]
        })
      });
      const data=await res.json();
      const reply=data.content?.map(b=>b.text||'').join('')||"Couldn't get a response — try again in a moment!";
      setMsgs(m=>[...m,{id:Date.now()+1,role:'ai',text:reply,t:now()}]);

      console.error(err);
      setMsgs(m=>[...m,{id:Date.now()+1,role:'ai',text:"Connection issue — check your internet and try again.",t:now()}]);
    }
    setBusy(false);

    r.lang='en-IN'; r.continuous=false; r.interimResults=false;
    r.onstart=()=>setMic(true);
    r.onresult=e=>{ const t=e.results[0][0].transcript; setInp(t); setMic(false); send(t); };
    r.onerror=()=>setMic(false); r.onend=()=>setMic(false);
    recog.current=r; r.start();
  };

  const exportJSON=()=>{

          <div className="ai-info">
            <div className="ai-name">Finny</div>

              {mic?'🎙 Listening…':busy?'Thinking…':'AI finance advisor'}
            </div>
          </div>
          <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto',fontSize:11}} onClick={exportJSON}>↓ JSON</button>
          <button className="modal-x" onClick={()=>{synth.current?.cancel();setOpen(false);}}>✕</button>
        </div>

        <div className="chips">
          {CHIPS.map(c=><div key={c} className="chip" onClick={()=>send(c)}>{c}</div>)}
        </div>

        <div className="ai-msgs" ref={listRef}>
          {msgs.map(m=>(
            <div key={m.id} className={`msg-wrap ${m.role}`}>
              <div className="msg-ava">
                {m.role==='ai' ? <FinnyAvatar size={16}/> : '👤'}
              </div>
              <div>
                <div className="msg-bubble">{m.text}</div>
                <div className="msg-time">{m.t}</div>
              </div>
            </div>
          ))}
          {busy&&(
            <div className="msg-wrap ai">
              <div className="msg-ava"><FinnyAvatar size={16}/></div>
              <div className="msg-bubble"><div className="typing"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div></div>
            </div>
          )}
        </div>

        <div className="ai-input-area">
          <div className="ai-input-row">
            <input
              className="ai-input"
              placeholder={mic?'Listening…':'Ask about your finances…'}
              value={inp}
              onChange={e=>setInp(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send(inp)}
              disabled={busy||mic}

function Transactions({search}){
  const {s,d}=useS();
  const {txns,role}=s;
  const isAdmin=role==='admin';
  const [fType,setFType]=useState('all');
  const [fCat,setFCat]=useState('all');
  const [from,setFrom]=useState('');
  const [to,setTo]=useState('');
  const [sort,setSort]=useState({k:'date',dir:'desc'});
  const [modal,setModal]=useState(null);

  const tog=k=>setSort(p=>({k,dir:p.k===k?(p.dir==='asc'?'desc':'asc'):'desc'}));

  const list=txns.filter(t=>{
    if(fType!=='all'&&t.type!==fType) return false;
    if(fCat!=='all'&&t.cat!==fCat) return false;
    if(from&&t.date<from) return false;
    if(to&&t.date>to) return false;
    if(search){ const q=search.toLowerCase(); return t.desc.toLowerCase().includes(q)||catOf(t.cat).name.toLowerCase().includes(q); }
    return true;
  }).sort((a,b)=>{
    let va=a[sort.k],vb=b[sort.k];
    if(sort.k==='amount'){va=Math.abs(va);vb=Math.abs(vb);}
    if(sort.k==='date'){va=new Date(va);vb=new Date(vb);}
    return va<vb?(sort.dir==='asc'?-1:1):va>vb?(sort.dir==='asc'?1:-1):0;
  });

  const exportCSV=()=>{
    const rows=[['Date','Description','Category','Type','Amount','Note']];
    list.forEach(t=>rows.push([t.date,t.desc,catOf(t.cat).name,t.type,t.amount,t.note]));
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='transactions.csv'; a.click();
  };

  const Arr=({k})=><span style={{marginLeft:3,opacity:.45,fontSize:9}}>{sort.k===k?(sort.dir==='asc'?'▲':'▼'):'⇅'}</span>;

  return <div>
    <div className="page-head" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:10}}>
      <div><h1>Transactions</h1><p>{list.length} of {txns.length}</p></div>
      <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
        <button className="btn btn-outline btn-sm" onClick={exportCSV}>↓ CSV</button>
        {isAdmin&&<button className="btn btn-primary btn-sm" onClick={()=>setModal('new')}>+ Add</button>}
      </div>
    </div>

    {!isAdmin&&<div className="info-banner">ℹ You are in viewer mode — read only.</div>}

    <div className="table-card">
      <div className="table-toolbar">
        <select className="select-field" value={fType} onChange={e=>setFType(e.target.value)}>
          <option value="all">All types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select className="select-field" value={fCat} onChange={e=>setFCat(e.target.value)}>
          <option value="all">All categories</option>
          {CATS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input type="date" className="date-field" value={from} onChange={e=>setFrom(e.target.value)}/>
        <input type="date" className="date-field" value={to} onChange={e=>setTo(e.target.value)}/>
        {(fType!=='all'||fCat!=='all'||from||to)&&
          <button className="btn btn-ghost btn-sm" onClick={()=>{setFType('all');setFCat('all');setFrom('');setTo('');}}>✕ Clear</button>}
        <div className="table-toolbar-right"/>
      </div>
      <div style={{overflowX:'auto'}}>
        {list.length===0
          ? <div className="empty"><p>Nothing matches</p></div>
          : <table>
            <thead><tr>
              <th onClick={()=>tog('date')}>Date<Arr k="date"/></th>
              <th onClick={()=>tog('desc')}>Description<Arr k="desc"/></th>
              <th>Category</th>
              <th>Type</th>
              <th onClick={()=>tog('amount')}>Amount<Arr k="amount"/></th>
              {isAdmin&&<th>Actions</th>}
            </tr></thead>
            <tbody>
              {list.map(tx=>{
                const c=catOf(tx.cat);
                return <tr key={tx.id}>
                  <td className="mono">{fmtDate(tx.date)}</td>
                  <td>
                    <div style={{fontWeight:500}}>{tx.desc}</div>
                    {tx.note&&<div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{tx.note}</div>}
                  </td>
                  <td>
                    <span className="cat-tag" style={{background:getCatBg(tx.cat,s.dark),color:c.color}}>
                      <span style={{width:5,height:5,borderRadius:'50%',background:c.color,display:'inline-block'}}/>
                      {c.name}
                    </span>
                  </td>
                  <td><span className={`type-badge type-${tx.type}`}>{tx.type}</span></td>
                  <td className={tx.amount>=0?'amount-pos':'amount-neg'}>{tx.amount>=0?'+':''}{fmtMoney(tx.amount)}</td>
                  {isAdmin&&<td>
                    <div className="action-row">
                      <button className="btn btn-ghost btn-sm" onClick={()=>setModal({...tx,amount:Math.abs(tx.amount)})}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('Delete?'))d({type:'DEL',id:tx.id});}}>Del</button>
                    </div>
                  </td>}
                </tr>;
              })}
            </tbody>
          </table>
        }
      </div>
    </div>
    {modal&&<TxModal tx={modal==='new'?null:modal} onClose={()=>setModal(null)}/>}
  </div>;
}

function Insights(){
  const {s}=useS();
  const {txns}=s;
  const {inc,exp,bal,sav,byCat}=stats(txns);

  const expCatsAll=CATS.filter(c=>c.id!=='salary'&&c.id!=='invest');
  const topCat=expCatsAll.reduce((top,c)=>byCat[c.id]>(byCat[top?.id]||0)?c:top,expCatsAll[0]);
  const totExp=expCatsAll.reduce((a,c)=>a+byCat[c.id],0);
  const avgExp=txns.filter(t=>t.amount<0).length?
    txns.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0)/txns.filter(t=>t.amount<0).length:0;

  const byM={};
  txns.forEach(t=>{
    const k=t.date.slice(0,7);
    if(!byM[k]) byM[k]={i:0,e:0};
    t.amount>0?byM[k].i+=t.amount:byM[k].e+=Math.abs(t.amount);
  });
  const months=Object.keys(byM).sort().slice(-6);
  const maxM=Math.max(...months.map(k=>Math.max(byM[k].i,byM[k].e)),1);

  const health=[
    {name:'Savings rate',val:sav,good:20,ok:10,unit:'%'},
    {name:'Income diversity',val:(new Set(txns.filter(t=>t.amount>0).map(t=>t.cat)).size/3)*100,good:66,ok:33,unit:'%',raw:`${new Set(txns.filter(t=>t.amount>0).map(t=>t.cat)).size} sources`},
    {name:'Expense control',val:inc>0?Math.max(0,100-(exp/inc*100)):0,good:70,ok:50,unit:'%'},
  ];

  return <div>
    <div className="page-head">
      <h1>Insights</h1>
      <p>Breakdown and health indicators</p>
    </div>

    <div className="insights-grid">
      {[
        {label:'Net savings',val:fmtMoney(bal),cls:bal>=0?'val-green':'val-red',sub:sav.toFixed(1)+'% savings rate'},
        {label:'Avg. expense',val:fmtMoney(avgExp),cls:'val-amber',sub:'per transaction'},
        {label:'Top category',val:catOf(topCat?.id).name,cls:'',sub:totExp>0?((byCat[topCat?.id]||0)/totExp*100).toFixed(1)+'% of spending':'',col:catOf(topCat?.id).color},
      ].map(x=>(
        <div key={x.label} className="stat-card">
          <div className="stat-card-label">{x.label}</div>
          <div className={`stat-card-value ${x.cls}`} style={x.col?{color:x.col,fontSize:16}:{}}>{x.val}</div>
          <div className="stat-card-sub">{x.sub}</div>
        </div>
      ))}
    </div>

    <div className="charts-row">
      <div className="card">
        <div className="card-label">Monthly — income vs expenses</div>
        <div className="month-list">
          {months.map(m=>{
            const dt=byM[m];
            return <div key={m} className="month-item">
              <div className="month-head">
                <span className="month-name">{m}</span>
                <div className="month-nums">
                  <span style={{color:'var(--green)'}}>+{fmtMoney(dt.i)}</span>
                  <span style={{color:'var(--red)'}}>-{fmtMoney(dt.e)}</span>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:3}}>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${(dt.i/maxM)*100}%`,background:'var(--green)'}}/></div>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${(dt.e/maxM)*100}%`,background:'var(--red)'}}/></div>
              </div>
            </div>;
          })}
        </div>
      </div>
      <div className="card">
        <div className="card-label">Category breakdown</div>
        <div className="cat-list">
          {CATS.filter(c=>byCat[c.id]>0).sort((a,b)=>byCat[b.id]-byCat[a.id]).map(c=>{
            const tot=CATS.reduce((a,x)=>a+byCat[x.id],0);
            const pct=tot>0?(byCat[c.id]/tot*100):0;
            return <div key={c.id}>
              <div className="cat-row">
                <span className="cat-name"><span className="cat-dot" style={{background:c.color}}/>{c.name}</span>
                <span className="cat-amt" style={{color:c.color}}>{fmtMoney(byCat[c.id])}</span>
              </div>
              <div className="cat-bar"><div className="cat-fill" style={{width:`${pct}%`,background:c.color}}/></div>
            </div>;
          })}
        </div>
      </div>
    </div>

    <div className="card">
      <div className="card-label">Financial health</div>
      <div className="health-grid">
        {health.map(h=>{
          const col=h.val>=h.good?'var(--green)':h.val>=h.ok?'var(--amber)':'var(--red)';
          return <div key={h.name}>
            <div className="health-name">{h.name}</div>
            <div className="health-val" style={{color:col}}>{h.raw||`${h.val.toFixed(0)}${h.unit}`}</div>
            <div className="prog-bar"><div className="prog-fill" style={{width:`${Math.min(h.val,100)}%`,background:col}}/></div>
            <div className="health-status" style={{color:col}}>{h.val>=h.good?'Looking good':'Room to improve'}</div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

              <input
                placeholder="Search…" value={search}
                onChange={e=>{setSearch(e.target.value);if(page!=='transactions')setPage('transactions');}}
              />
            </div>
            <button className="theme-btn" onClick={()=>d({type:'DARK',dark:!s.dark})} title="Toggle theme">
              {s.dark ? '☀' : '◑'}
            </button>
          </div>
        </header>

        <div className="page">
          {page==='dashboard'&&<Dashboard/>}
          {page==='transactions'&&<Transactions search={search}/>}
          {page==='insights'&&<Insights/>}
          {page==='upi'&&<UPIAutomation/>}
        </div>
      </div>
    </div>
    <AIPanel txns={s.txns}/>
  </>;
}

function App(){ return <Provider><Shell/></Provider>; }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
